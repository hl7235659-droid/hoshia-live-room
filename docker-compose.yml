name: live-room-dev

services:
  live-room-web:
    build:
      context: ./frontend
    container_name: live-room-dev-web
    restart: unless-stopped
    depends_on:
      - live-room-gateway
    ports:
      - "${LIVE_ROOM_BIND_HOST:-127.0.0.1}:${LIVE_ROOM_PORT:-18888}:80"
    networks:
      - live_room_dev_network

  live-room-gateway:
    build:
      context: ./gateway
    container_name: live-room-dev-gateway
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://live-room-redis:6379/0
      SQLITE_DB_PATH: /app/data/live-room.sqlite
    volumes:
      - ./gateway/data:/app/data
    depends_on:
      - live-room-redis
      - xiaomusic
      - qqmusic-resolver
    networks:
      - live_room_dev_network
      - astrbot_astrbot_network

  live-room-redis:
    image: redis:7-alpine
    container_name: live-room-dev-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - live_room_dev_network

  xiaomusic:
    image: hanxi/xiaomusic:latest
    container_name: live-room-dev-xiaomusic
    restart: unless-stopped
    environment:
      QQMUSIC_RESOLVER_URL: http://qqmusic-resolver:8190
    ports:
      - "127.0.0.1:58090:8090"
    volumes:
      - ../xiaomusic/music:/app/music
      - ../xiaomusic/conf:/app/conf
      - ./services/qqmusic-resolver/xiaomusic/QQMusicVIP.js:/app/conf/js_plugins/QQMusicVIP.js:ro
    depends_on:
      - qqmusic-resolver
    networks:
      - live_room_dev_network

  qqmusic-resolver:
    build:
      context: ./services/qqmusic-resolver
    container_name: live-room-dev-qqmusic-resolver
    restart: unless-stopped
    environment:
      PORT: 8190
      QQMUSIC_COOKIE_FILE: /app/private/cookies.txt
    ports:
      - "127.0.0.1:${QQMUSIC_RESOLVER_PORT:-58190}:8190"
    volumes:
      - ../qqmusic-resolver/private:/app/private
    networks:
      - live_room_dev_network

  rsshub:
    image: diygod/rsshub:latest
    container_name: live-room-dev-rsshub
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
    networks:
      - live_room_dev_network
      - astrbot_astrbot_network

networks:
  live_room_dev_network:
    name: live_room_dev_network
  astrbot_astrbot_network:
    external: true
